# Social Vista — self-hosted stack: local Postgres + app, fronted by your EXISTING
# shared Caddy (reverse-proxy-caddy-1) on the external "web" network. Replaces the
# Railway/Neon deployment. Configure values in .env (see .env.example).
services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # PG18+ images store data in a version-specific subdir, so the volume mounts at
    # /var/lib/postgresql (NOT the old /var/lib/postgresql/data).
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot: creates/updates the schema on the local DB (drizzle-kit push), then exits.
  migrate:
    build: .
    command: ["pnpm", "--filter", "@workspace/db", "run", "push"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    # App secrets (SESSION_SECRET, GROQ_API_KEY, RESEND_*, ADMIN_*, PUBLIC_APP_URL, ...).
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "5000"
      # Local Postgres — overrides any DATABASE_URL from .env (no more Neon).
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    networks:
      internal: # to reach db
      web: # shared reverse-proxy-caddy-1 reaches this app via the alias below
        aliases:
          - socialvista-web
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

networks:
  internal:
  # The network your existing reverse-proxy-caddy-1 is attached to.
  web:
    external: true

volumes:
  pgdata:
