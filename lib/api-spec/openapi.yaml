openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Social Vista API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: services
    description: Service offerings
  - name: contact
    description: Contact form
  - name: chat
    description: AI chat widget
  - name: admin
    description: Admin CMS operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [admin]
      summary: Create a service (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get a service by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    patch:
      operationId: updateService
      tags: [admin]
      summary: Update a service (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [admin]
      summary: Delete a service (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /admin/contacts:
    get:
      operationId: listContacts
      tags: [admin]
      summary: List all contact submissions (admin)
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"

  /admin/contacts/{id}/read:
    patch:
      operationId: markContactRead
      tags: [admin]
      summary: Mark a contact message as read (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResult"

  /admin/content:
    get:
      operationId: getContent
      tags: [admin]
      summary: Get site content (hero, about, etc.)
      responses:
        "200":
          description: Content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentBlock"
    post:
      operationId: upsertContent
      tags: [admin]
      summary: Upsert a content block (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentBlockInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentBlock"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a chat message to AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [services]
      summary: List testimonials
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"

  /admin/me:
    get:
      operationId: getCurrentUser
      tags: [admin]
      summary: Get the currently authenticated staff user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /admin/leads:
    get:
      operationId: listLeads
      tags: [admin]
      summary: List leads (admin)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [admin]
      summary: Create a lead (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /admin/leads/import:
    post:
      operationId: importLeads
      tags: [admin]
      summary: Bulk-import leads from a spreadsheet (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadImportResult"

  /admin/leads/{id}:
    patch:
      operationId: updateLead
      tags: [admin]
      summary: Update a lead (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [admin]
      summary: Delete a lead (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /admin/leads/{id}/activities:
    get:
      operationId: listLeadActivities
      tags: [admin]
      summary: List the activity timeline for a lead (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chronological activity log for the lead
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadActivity"
    post:
      operationId: createLeadActivity
      tags: [admin]
      summary: Add a manual activity log entry for a lead (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadActivityInput"
      responses:
        "201":
          description: Activity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadActivity"

  /admin/activities:
    get:
      operationId: listRecentActivities
      tags: [admin]
      summary: List the most recent activities across all leads (admin)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Most recent cross-lead activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentActivity"

  /admin/leads/{id}/reply:
    post:
      operationId: replyToLead
      tags: [admin]
      summary: Send an email reply to a lead (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadReplyInput"
      responses:
        "200":
          description: Reply sent; lead marked contacted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /admin/email-assets:
    get:
      operationId: listEmailAssets
      tags: [admin]
      summary: List previously uploaded email images for reuse (admin)
      responses:
        "200":
          description: List of recent email images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailAsset"
    post:
      operationId: uploadEmailAsset
      tags: [admin]
      summary: Upload an image for use in lead emails (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailAssetUpload"
      responses:
        "201":
          description: Image stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailAsset"

  /admin/email-assets/{id}:
    delete:
      operationId: deleteEmailAsset
      tags: [admin]
      summary: Delete an unused email image (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "409":
          description: Image has already been sent and cannot be deleted

  /admin/tasks:
    get:
      operationId: listTasks
      tags: [admin]
      summary: List tasks (admin)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: assignedTo
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [admin]
      summary: Create a task (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /admin/tasks/{id}:
    patch:
      operationId: updateTask
      tags: [admin]
      summary: Update a task (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [admin]
      summary: Delete a task (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /admin/staff:
    get:
      operationId: listStaff
      tags: [admin]
      summary: List staff members (admin)
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [admin]
      summary: Create a staff member (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /admin/staff/{id}:
    patch:
      operationId: updateStaff
      tags: [admin]
      summary: Update a staff member (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
    delete:
      operationId: deleteStaff
      tags: [admin]
      summary: Delete a staff member (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /admin/staff/{id}/password:
    patch:
      operationId: resetStaffPassword
      tags: [admin]
      summary: Reset a staff member's password (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffPasswordInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /admin/roles:
    get:
      operationId: listRoles
      tags: [admin]
      summary: List roles (admin)
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
    post:
      operationId: createRole
      tags: [admin]
      summary: Create a role (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /admin/roles/{id}:
    patch:
      operationId: updateRole
      tags: [admin]
      summary: Update a role (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
    delete:
      operationId: deleteRole
      tags: [admin]
      summary: Delete a role (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Service:
      type: object
      required: [id, title, description, icon, category, sortOrder, active]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string

    ServiceInput:
      type: object
      required: [title, description, icon, category]
      properties:
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean

    ServiceUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean

    Contact:
      type: object
      required: [id, name, email, message, service, isRead, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        message:
          type: string
        service:
          type: ["string", "null"]
        isRead:
          type: boolean
        createdAt:
          type: string

    ContactInput:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        message:
          type: string
        service:
          type: string

    AdminStats:
      type: object
      required: [totalContacts, unreadContacts, totalServices, activeServices, totalLeads, newLeads]
      properties:
        totalContacts:
          type: integer
        unreadContacts:
          type: integer
        totalServices:
          type: integer
        activeServices:
          type: integer
        totalLeads:
          type: integer
        newLeads:
          type: integer

    AdminLoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AdminLoginResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        token:
          type: string
        user:
          $ref: "#/components/schemas/StaffMember"

    Permissions:
      type: object
      required: [canViewLeads, canCreateLeads, canEditLeads, canDeleteLeads, canAssignLeads, canEmailLeads]
      properties:
        canViewLeads:
          type: boolean
        canCreateLeads:
          type: boolean
        canEditLeads:
          type: boolean
        canDeleteLeads:
          type: boolean
        canAssignLeads:
          type: boolean
        canEmailLeads:
          type: boolean

    Role:
      type: object
      required: [id, name, canViewLeads, canCreateLeads, canEditLeads, canDeleteLeads, canAssignLeads, canEmailLeads, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        canViewLeads:
          type: boolean
        canCreateLeads:
          type: boolean
        canEditLeads:
          type: boolean
        canDeleteLeads:
          type: boolean
        canAssignLeads:
          type: boolean
        canEmailLeads:
          type: boolean
        createdAt:
          type: string

    RoleInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        canViewLeads:
          type: boolean
        canCreateLeads:
          type: boolean
        canEditLeads:
          type: boolean
        canDeleteLeads:
          type: boolean
        canAssignLeads:
          type: boolean
        canEmailLeads:
          type: boolean

    RoleUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        canViewLeads:
          type: boolean
        canCreateLeads:
          type: boolean
        canEditLeads:
          type: boolean
        canDeleteLeads:
          type: boolean
        canAssignLeads:
          type: boolean
        canEmailLeads:
          type: boolean

    StaffMember:
      type: object
      required: [id, name, username, role, active, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
        roleId:
          type: ["integer", "null"]
        roleName:
          type: ["string", "null"]
        permissions:
          $ref: "#/components/schemas/Permissions"
        active:
          type: boolean
        createdAt:
          type: string

    StaffInput:
      type: object
      required: [name, username, password]
      properties:
        name:
          type: string
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [owner, staff]
        roleId:
          type: ["integer", "null"]

    StaffUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [owner, staff]
        roleId:
          type: ["integer", "null"]
        active:
          type: boolean

    StaffPasswordInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    Lead:
      type: object
      required: [id, name, status, source, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        serviceInterest:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        preferredTime:
          type: ["string", "null"]
        adminNotes:
          type: ["string", "null"]
        status:
          type: string
        source:
          type: string
        assignedTo:
          type: ["integer", "null"]
        lastContactedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    LeadInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        serviceInterest:
          type: string
        message:
          type: string
        preferredTime:
          type: string
        source:
          type: string

    LeadImportInput:
      type: object
      required: [leads]
      properties:
        leads:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: "#/components/schemas/LeadInput"
        source:
          type: string
          description: Source label applied to every imported lead. Defaults to "import".

    LeadImportError:
      type: object
      required: [row, error]
      properties:
        row:
          type: integer
        error:
          type: string

    LeadImportResult:
      type: object
      required: [imported, failed, errors]
      properties:
        imported:
          type: integer
        failed:
          type: integer
        errors:
          type: array
          items:
            $ref: "#/components/schemas/LeadImportError"

    LeadUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [new, contacted, booked, closed]
        assignedTo:
          type: ["integer", "null"]
        adminNotes:
          type: string
        markContacted:
          type: boolean
          description: When true, records the current time as the lead's last-contacted timestamp.

    LeadReplyInput:
      type: object
      required: [subject, message]
      properties:
        subject:
          type: string
          minLength: 1
          maxLength: 200
        message:
          type: string
