openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Social Vista API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: services
    description: Service offerings
  - name: contact
    description: Contact form
  - name: chat
    description: AI chat widget
  - name: admin
    description: Admin CMS operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [admin]
      summary: Create a service (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get a service by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    patch:
      operationId: updateService
      tags: [admin]
      summary: Update a service (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [admin]
      summary: Delete a service (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /admin/contacts:
    get:
      operationId: listContacts
      tags: [admin]
      summary: List all contact submissions (admin)
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"

  /admin/contacts/{id}/read:
    patch:
      operationId: markContactRead
      tags: [admin]
      summary: Mark a contact message as read (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResult"

  /admin/content:
    get:
      operationId: getContent
      tags: [admin]
      summary: Get site content (hero, about, etc.)
      responses:
        "200":
          description: Content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentBlock"
    post:
      operationId: upsertContent
      tags: [admin]
      summary: Upsert a content block (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentBlockInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentBlock"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a chat message to AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [services]
      summary: List testimonials
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Service:
      type: object
      required: [id, title, description, icon, category, sortOrder, active]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string

    ServiceInput:
      type: object
      required: [title, description, icon, category]
      properties:
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean

    ServiceUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean

    Contact:
      type: object
      required: [id, name, email, message, service, isRead, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        message:
          type: string
        service:
          type: ["string", "null"]
        isRead:
          type: boolean
        createdAt:
          type: string

    ContactInput:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        message:
          type: string
        service:
          type: string

    AdminStats:
      type: object
      required: [totalContacts, unreadContacts, totalServices, activeServices]
      properties:
        totalContacts:
          type: integer
        unreadContacts:
          type: integer
        totalServices:
          type: integer
        activeServices:
          type: integer

    AdminLoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AdminLoginResult:
      type: object
      required: [success, token]
      properties:
        success:
          type: boolean
        token:
          type: string

    ContentBlock:
      type: object
      required: [id, key, value, updatedAt]
      properties:
        id:
          type: integer
        key:
          type: string
        value:
          type: string
        updatedAt:
          type: string

    ContentBlockInput:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          type: string

    ChatMessageInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
        sessionId:
          type: string

    ChatResponse:
      type: object
      required: [reply]
      properties:
        reply:
          type: string

    Testimonial:
      type: object
      required: [id, name, company, message, rating]
      properties:
        id:
          type: integer
        name:
          type: string
        company:
          type: string
        message:
          type: string
        rating:
          type: integer
        avatarUrl:
          type: ["string", "null"]

    DeleteResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
